<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 100%;
            padding: 10px;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h3 class="login-title">Admin Login</h3>

        <div th:if="${nqtError}" class="alert alert-danger" role="alert">
            <span th:text="${nqtError}"></span>
        </div>

        <form th:action="@{/admin/login}" method="post">
            <div class="mb-3">
                <label for="nqtTaiKhoan" class="form-label">Tài khoản hoặc Email</label>
                <input type="text" class="form-control" id="nqtTaiKhoan" name="nqtTaiKhoan" required autofocus>
            </div>
            <div class="mb-3">
                <label for="nqtMatKhau" class="form-label">Mật khẩu</label>
                <input type="password" class="form-control" id="nqtMatKhau" name="nqtMatKhau" required>
            </div>
            <button type="submit" class="btn btn-primary">Đăng nhập</button>
        </form>
    </div>
</body>

</html>
