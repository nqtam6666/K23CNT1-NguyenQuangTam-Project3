<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${nqtTieuDe} ?: (${nqtWebsiteName} ?: 'Admin Login')">Admin Login</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center"
    th:style="'background-color: ' + (${nqtWebsiteColor} ?: '#4e73df')">
    <div class="bg-white p-10 rounded-xl shadow-2xl w-full max-w-md">
        <h3 class="text-2xl font-bold text-center text-gray-800 mb-8" th:text="${nqtWebsiteName} ?: 'Admin Login'">Admin
            Login</h3>

        <div th:if="${nqtError}"
            class="mb-6 p-4 text-red-700 bg-red-100 rounded-lg border border-red-200 flex items-center" role="alert">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd"
                    d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                    clip-rule="evenodd" />
            </svg>
            <span th:text="${nqtError}"></span>
        </div>

        <form th:action="@{/admin/login}" method="post" class="space-y-6">
            <div>
                <label for="nqtTaiKhoan" class="block text-sm font-medium text-gray-700 mb-1">Tài khoản hoặc
                    Email</label>
                <input type="text"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition-all"
                    id="nqtTaiKhoan" name="nqtTaiKhoan" required autofocus placeholder="Nhập tài khoản...">
            </div>
            <div>
                <label for="nqtMatKhau" class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                <input type="password"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition-all"
                    id="nqtMatKhau" name="nqtMatKhau" required placeholder="Nhập mật khẩu...">
            </div>
            <button type="submit"
                class="w-full py-3 px-4 text-white font-bold rounded-lg shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200"
                th:style="'background-color: ' + (${nqtWebsiteColor} ?: '#4e73df')">
                Đăng nhập
            </button>
        </form>
    </div>
</body>

</html>
