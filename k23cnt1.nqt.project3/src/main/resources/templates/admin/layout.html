<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(nqtTitle)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${nqtTitle} ?: 'Admin - Quản lý Khách sạn'">Admin</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>

<body>

    <!-- Sidebar -->
    <ul class="navbar-nav sidebar accordion" id="accordionSidebar">
        <!-- Sidebar - Brand -->
        <a class="sidebar-brand d-flex align-items-center justify-content-center" th:href="@{/admin}">
            <div class="sidebar-brand-icon">
                <img th:src="@{/favicon.ico}" alt="Icon" width="30" height="30" class="img-fluid">
            </div>
            <div class="sidebar-brand-text mx-3">Admin Panel</div>
        </a>

        <!-- Divider -->
        <hr class="sidebar-divider my-0" style="border-top: 1px solid rgba(255,255,255,0.15);">

        <!-- Nav Item - Dashboard -->
        <li class="nav-item active">
            <a class="nav-link" th:href="@{/admin}">
                <i class="bi bi-speedometer2"></i>
                <span>Dashboard</span>
            </a>
        </li>

        <!-- Divider -->
        <hr class="sidebar-divider" style="border-top: 1px solid rgba(255,255,255,0.15); margin: 0 1rem;">

        <!-- Heading -->
        <div class="sidebar-heading">
            Quản lý Phòng
        </div>

        <!-- Nav Item - Pages Collapse Menu -->
        <li class="nav-item">
            <a class="nav-link collapsed" href="#" data-bs-toggle="collapse" data-bs-target="#collapseRoom"
                aria-expanded="true" aria-controls="collapseRoom">
                <i class="bi bi-house-door"></i>
                <span>Phòng & Loại</span>
            </a>
            <div id="collapseRoom" class="collapse" aria-labelledby="headingTwo" data-bs-parent="#accordionSidebar">
                <div class="collapse-inner py-2 collapse-inner rounded">
                    <h6 class="collapse-header"
                        style="padding: .5rem 1.5rem; margin: 0; font-size: .85rem; font-weight: 700; text-transform: uppercase; color: #b7b9cc;">
                        Danh mục</h6>
                    <a class="collapse-item" th:href="@{/admin/loai-phong}">Loại phòng</a>
                    <a class="collapse-item" th:href="@{/admin/phong}">Danh sách Phòng</a>
                    <a class="collapse-item" th:href="@{/admin/dat-phong}">Đặt phòng</a>
                </div>
            </div>
        </li>

        <!-- Heading -->
        <div class="sidebar-heading">
            Dịch vụ
        </div>

        <li class="nav-item">
            <a class="nav-link collapsed" href="#" data-bs-toggle="collapse" data-bs-target="#collapseService"
                aria-expanded="true" aria-controls="collapseService">
                <i class="bi bi-star"></i>
                <span>Dịch vụ</span>
            </a>
            <div id="collapseService" class="collapse" aria-labelledby="headingUtilities"
                data-bs-parent="#accordionSidebar">
                <div class="collapse-inner py-2 collapse-inner rounded">
                    <a class="collapse-item" th:href="@{/admin/dich-vu}">Danh sách Dịch vụ</a>
                    <a class="collapse-item" th:href="@{/admin/don-gia-dich-vu}">Đơn giá Dịch vụ</a>
                </div>
            </div>
        </li>

        <!-- Heading -->
        <div class="sidebar-heading">
            Quản lý Chung
        </div>

        <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/nguoi-dung}">
                <i class="bi bi-people"></i>
                <span>Người dùng</span>
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/danh-gia}">
                <i class="bi bi-chat-dots"></i>
                <span>Đánh giá</span>
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/blog}">
                <i class="bi bi-newspaper"></i>
                <span>Blog</span>
            </a>
        </li>

        <!-- Heading -->
        <div class="sidebar-heading">
            Thống kê
        </div>

        <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/thong-ke/doanh-thu}">
                <i class="bi bi-graph-up"></i>
                <span>Doanh thu</span>
            </a>
        </li>

        <!-- Divider -->
        <hr class="sidebar-divider d-none d-md-block"
            style="border-top: 1px solid rgba(255,255,255,0.15); margin: 1rem;">


    </ul>
    <!-- End of Sidebar -->

    <!-- Main Content Wrapper -->
    <div class="main-content">

        <!-- Topbar -->
        <nav class="navbar navbar-expand navbar-light topbar mb-4 static-top shadow">
            <!-- Sidebar Toggle (Topbar) -->
            <button id="sidebarToggle" class="btn btn-link rounded-circle mr-3">
                <i class="bi bi-list"></i>
            </button>

            <!-- Topbar Navbar -->
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-3">
                    <span class="text-secondary">Xin chào,</span>
                    <span class="text-danger fw-bold"
                        th:text="${session.nqtAdminUser != null ? session.nqtAdminUser.nqtHoVaTen : 'Admin'}">
                    </span>
                </li>
                <li class="nav-item">
                    <a class="btn btn-outline-danger btn-sm rounded-pill px-3 shadow-sm" th:href="@{/admin/logout}">
                        <i class="bi bi-box-arrow-right me-1"></i> Đăng xuất
                    </a>
                </li>
            </ul>
        </nav>
        <!-- End of Topbar -->

        <!-- Begin Page Content -->
        <div class="content-wrapper">
            <div th:if="${nqtSuccess}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle"></i> <span th:text="${nqtSuccess}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${nqtError}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle"></i> <span th:text="${nqtError}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:replace="~{::content}"></div>
        </div>
        <!-- /.container-fluid -->

    </div>
    <!-- End of Main Content -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>
</body>

</html>
