<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(nqtTitle)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${nqtTitle} ?: (${nqtTieuDe} ?: (${nqtWebsiteName} ?: 'Admin - Quản lý Khách sạn'))">Admin</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4e73df',
                        secondary: '#858796',
                        success: '#1cc88a',
                        info: '#36b9cc',
                        warning: '#f6c23e',
                        danger: '#e74a3b',
                        light: '#f8f9fc',
                        dark: '#5a5c69',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
        }

        /* Custom scrollbar for sidebar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body class="bg-gray-100 font-sans antialiased" x-data="{ sidebarOpen: false }">

    <div class="flex h-screen overflow-hidden">

        <!-- Mobile Sidebar Overlay -->
        <div x-show="sidebarOpen" @click="sidebarOpen = false"
            x-transition:enter="transition-opacity ease-linear duration-300" x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100" x-transition:leave="transition-opacity ease-linear duration-300"
            x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
            class="fixed inset-0 bg-gray-900 bg-opacity-50 z-20 lg:hidden"></div>

        <!-- Sidebar -->
        <div class="fixed inset-y-0 left-0 z-30 w-64 text-white transition-transform duration-300 ease-in-out transform lg:translate-x-0 lg:static lg:inset-0 flex flex-col"
            :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
            th:style="'background-color: ' + (${nqtWebsiteColor} ?: '#4e73df')">

            <!-- Sidebar Brand -->
            <a class="flex items-center justify-center h-16 font-bold text-xl tracking-wider uppercase shrink-0"
                th:href="@{/admin}">
                <div class="mr-2">
                    <img th:src="@{/favicon.ico}" alt="Icon" class="w-8 h-8">
                </div>
                <div th:text="${nqtWebsiteName} ?: 'Admin Panel'">Admin Panel</div>
            </a>

            <hr class="border-white/20 my-0">

            <!-- Nav Items -->
            <div class="flex-1 overflow-y-auto py-4 custom-scrollbar">
                <nav class="space-y-1 px-2">
                    <!-- Dashboard -->
                    <a th:href="@{/admin}"
                        class="flex items-center px-4 py-2 text-sm font-medium rounded-md hover:bg-white/10 transition-colors group">
                        <i class="bi bi-speedometer2 mr-3 text-lg"></i>
                        Dashboard
                    </a>

                    <hr class="border-white/20 my-2 mx-4">
                    <div class="px-4 text-xs font-bold text-white/50 uppercase tracking-wider mb-1">Quản lý Phòng</div>

                    <!-- Room Management -->
                    <div x-data="{ open: false }">
                        <button @click="open = !open"
                            class="w-full flex items-center justify-between px-4 py-2 text-sm font-medium rounded-md hover:bg-white/10 transition-colors focus:outline-none">
                            <div class="flex items-center">
                                <i class="bi bi-house-door mr-3 text-lg"></i>
                                Phòng & Loại
                            </div>
                            <i class="bi bi-chevron-down text-xs transition-transform duration-200"
                                :class="{'rotate-180': open}"></i>
                        </button>
                        <div x-show="open" x-collapse
                            class="pl-11 pr-2 py-1 space-y-1 bg-black/10 rounded-md mt-1 mx-2">
                            <a th:href="@{/admin/loai-phong}"
                                class="block px-2 py-1 text-sm rounded-md hover:bg-white/10 transition-colors">Loại
                                phòng</a>
                            <a th:href="@{/admin/phong}"
                                class="block px-2 py-1 text-sm rounded-md hover:bg-white/10 transition-colors">Danh sách
                                Phòng</a>
                            <a th:href="@{/admin/dat-phong}"
                                class="block px-2 py-1 text-sm rounded-md hover:bg-white/10 transition-colors">Đặt
                                phòng</a>
                        </div>
                    </div>

                    <div class="px-4 text-xs font-bold text-white/50 uppercase tracking-wider mt-4 mb-1">Dịch vụ</div>

                    <!-- Service Management -->
                    <div x-data="{ open: false }">
                        <button @click="open = !open"
                            class="w-full flex items-center justify-between px-4 py-2 text-sm font-medium rounded-md hover:bg-white/10 transition-colors focus:outline-none">
                            <div class="flex items-center">
                                <i class="bi bi-star mr-3 text-lg"></i>
                                Dịch vụ
                            </div>
                            <i class="bi bi-chevron-down text-xs transition-transform duration-200"
                                :class="{'rotate-180': open}"></i>
                        </button>
                        <div x-show="open" x-collapse
                            class="pl-11 pr-2 py-1 space-y-1 bg-black/10 rounded-md mt-1 mx-2">
                            <a th:href="@{/admin/dich-vu}"
                                class="block px-2 py-1 text-sm rounded-md hover:bg-white/10 transition-colors">Danh sách
                                Dịch vụ</a>
                            <a th:href="@{/admin/don-gia-dich-vu}"
                                class="block px-2 py-1 text-sm rounded-md hover:bg-white/10 transition-colors">Đơn giá
                                Dịch vụ</a>
                        </div>
                    </div>

                    <div class="px-4 text-xs font-bold text-white/50 uppercase tracking-wider mt-4 mb-1">Quản lý Chung
                    </div>

                    <a th:href="@{/admin/nguoi-dung}"
                        class="flex items-center px-4 py-2 text-sm font-medium rounded-md hover:bg-white/10 transition-colors">
                        <i class="bi bi-people mr-3 text-lg"></i>
                        Người dùng
                    </a>

                    <a th:href="@{/admin/danh-gia}"
                        class="flex items-center px-4 py-2 text-sm font-medium rounded-md hover:bg-white/10 transition-colors">
                        <i class="bi bi-chat-dots mr-3 text-lg"></i>
                        Đánh giá
                    </a>

                    <a th:href="@{/admin/blog}"
                        class="flex items-center px-4 py-2 text-sm font-medium rounded-md hover:bg-white/10 transition-colors">
                        <i class="bi bi-newspaper mr-3 text-lg"></i>
                        Blog
                    </a>

                    <a th:href="@{/admin/setting}"
                        class="flex items-center px-4 py-2 text-sm font-medium rounded-md hover:bg-white/10 transition-colors">
                        <i class="bi bi-gear mr-3 text-lg"></i>
                        Cấu hình
                    </a>

                    <div class="px-4 text-xs font-bold text-white/50 uppercase tracking-wider mt-4 mb-1">Thống kê</div>

                    <a th:href="@{/admin/thong-ke/doanh-thu}"
                        class="flex items-center px-4 py-2 text-sm font-medium rounded-md hover:bg-white/10 transition-colors">
                        <i class="bi bi-graph-up mr-3 text-lg"></i>
                        Doanh thu
                    </a>
                </nav>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden bg-gray-100">
            <!-- Topbar -->
            <header class="flex items-center justify-between h-16 bg-white shadow-sm px-4 lg:px-6 z-10 shrink-0">
                <button @click="sidebarOpen = !sidebarOpen"
                    class="text-gray-500 hover:text-gray-700 focus:outline-none lg:hidden p-2 rounded-md hover:bg-gray-100">
                    <i class="bi bi-list text-2xl"></i>
                </button>

                <div class="flex items-center ml-auto space-x-4">
                    <div class="flex items-center text-sm hidden sm:flex">
                        <span class="text-gray-600 mr-2">Xin chào,</span>
                        <span class="font-bold text-danger"
                            th:text="${session.nqtAdminUser != null ? session.nqtAdminUser.nqtHoVaTen : 'Admin'}">
                        </span>
                    </div>
                    <a th:href="@{/admin/logout}"
                        class="flex items-center px-3 py-1.5 text-sm font-medium text-red-600 bg-red-50 hover:bg-red-100 rounded-full transition-colors">
                        <i class="bi bi-box-arrow-right mr-1.5"></i>
                        <span class="hidden sm:inline">Đăng xuất</span>
                    </a>
                </div>
            </header>

            <!-- Page Content -->
            <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 lg:p-6">
                <!-- Alerts -->
                <div th:if="${nqtSuccess}"
                    class="mb-4 p-4 text-green-700 bg-green-100 rounded-lg border border-green-200 flex items-center justify-between shadow-sm"
                    role="alert">
                    <div class="flex items-center">
                        <i class="bi bi-check-circle-fill mr-2 text-xl"></i>
                        <span th:text="${nqtSuccess}" class="font-medium"></span>
                    </div>
                    <button type="button" class="text-green-700 hover:text-green-900 focus:outline-none"
                        onclick="this.parentElement.remove()">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
                <div th:if="${nqtError}"
                    class="mb-4 p-4 text-red-700 bg-red-100 rounded-lg border border-red-200 flex items-center justify-between shadow-sm"
                    role="alert">
                    <div class="flex items-center">
                        <i class="bi bi-exclamation-triangle-fill mr-2 text-xl"></i>
                        <span th:text="${nqtError}" class="font-medium"></span>
                    </div>
                    <button type="button" class="text-red-700 hover:text-red-900 focus:outline-none"
                        onclick="this.parentElement.remove()">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>

                <div th:replace="~{::content}"></div>
            </main>
        </div>
    </div>

    <!-- Alpine.js for interactivity -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
</body>

</html>
