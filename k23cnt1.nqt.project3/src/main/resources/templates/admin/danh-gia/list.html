<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(nqtTitle='Quản lý Đánh giá')}">

<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-chat-dots"></i> Quản lý Đánh giá</h2>
            <a th:href="@{/admin/danh-gia/create}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Thêm mới
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Đặt phòng</th>
                                <th>Nội dung</th>
                                <th>Ngày đánh giá</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${nqtList}">
                                <td th:text="${item.nqtId}"></td>
                                <td th:text="${item.nqtDatPhongId}"></td>
                                <td th:text="${item.nqtNoiDungDanhGia}"></td>
                                <td th:text="${#temporals.format(item.nqtNgayDanhGia, 'dd/MM/yyyy HH:mm')}"></td>
                                <td>
                                    <span th:if="${item.nqtStatus}" class="badge bg-success">Hiện</span>
                                    <span th:unless="${item.nqtStatus}" class="badge bg-secondary">Ẩn</span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/danh-gia/edit/{id}(id=${item.nqtId})}"
                                        class="btn btn-sm btn-warning">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/admin/danh-gia/delete/{id}(id=${item.nqtId})}"
                                        class="btn btn-sm btn-danger"
                                        onclick="return confirm('Bạn có chắc chắn muốn xóa?');">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
