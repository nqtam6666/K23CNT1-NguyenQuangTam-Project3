<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(nqtTitle='Dashboard')}">

<body>
    <div th:fragment="content">
        <div class="d-sm-flex align-items-center justify-content-between mb-4">
            <h1 class="h3 mb-0 text-gray-800">Dashboard</h1>
            <!-- <a href="#" class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm">
                <i class="bi bi-download fa-sm text-white-50"></i> Generate Report
            </a> -->
        </div>

        <div class="row g-4 mb-4">
            <!-- Users Card -->
            <div class="col-xl-3 col-md-6">
                <div class="card bg-gradient-primary text-white h-100 py-2">
                    <div class="card-body">
                        <div class="row no-gutters align-items-center">
                            <div class="col mr-2">
                                <div class="text-xs font-weight-bold text-uppercase mb-1" style="opacity: 0.8;">
                                    Người dùng</div>
                                <div class="h5 mb-0 font-weight-bold" th:text="${#lists.size(nqtNguoiDungList) ?: 0}">0
                                </div>
                            </div>
                            <div class="col-auto">
                                <i class="bi bi-people-fill fa-2x text-gray-300"
                                    style="font-size: 2.5rem; opacity: 0.5;"></i>
                            </div>
                        </div>
                        <a th:href="@{/admin/nguoi-dung}" class="stretched-link"></a>
                    </div>
                </div>
            </div>

            <!-- Rooms Card -->
            <div class="col-xl-3 col-md-6">
                <div class="card bg-gradient-success text-white h-100 py-2">
                    <div class="card-body">
                        <div class="row no-gutters align-items-center">
                            <div class="col mr-2">
                                <div class="text-xs font-weight-bold text-uppercase mb-1" style="opacity: 0.8;">
                                    Phòng</div>
                                <div class="h5 mb-0 font-weight-bold" th:text="${#lists.size(nqtPhongList) ?: 0}">0
                                </div>
                            </div>
                            <div class="col-auto">
                                <i class="bi bi-house-door-fill fa-2x text-gray-300"
                                    style="font-size: 2.5rem; opacity: 0.5;"></i>
                            </div>
                        </div>
                        <a th:href="@{/admin/phong}" class="stretched-link"></a>
                    </div>
                </div>
            </div>

            <!-- Bookings Card -->
            <div class="col-xl-3 col-md-6">
                <div class="card bg-gradient-warning text-white h-100 py-2">
                    <div class="card-body">
                        <div class="row no-gutters align-items-center">
                            <div class="col mr-2">
                                <div class="text-xs font-weight-bold text-uppercase mb-1" style="opacity: 0.8;">
                                    Đặt phòng</div>
                                <div class="h5 mb-0 font-weight-bold" th:text="${#lists.size(nqtDatPhongList) ?: 0}">0
                                </div>
                            </div>
                            <div class="col-auto">
                                <i class="bi bi-calendar-check-fill fa-2x text-gray-300"
                                    style="font-size: 2.5rem; opacity: 0.5;"></i>
                            </div>
                        </div>
                        <a th:href="@{/admin/dat-phong}" class="stretched-link"></a>
                    </div>
                </div>
            </div>

            <!-- Services Card -->
            <div class="col-xl-3 col-md-6">
                <div class="card bg-gradient-info text-white h-100 py-2">
                    <div class="card-body">
                        <div class="row no-gutters align-items-center">
                            <div class="col mr-2">
                                <div class="text-xs font-weight-bold text-uppercase mb-1" style="opacity: 0.8;">
                                    Dịch vụ</div>
                                <div class="h5 mb-0 font-weight-bold" th:text="${#lists.size(nqtDichVuList) ?: 0}">0
                                </div>
                            </div>
                            <div class="col-auto">
                                <i class="bi bi-star-fill fa-2x text-gray-300"
                                    style="font-size: 2.5rem; opacity: 0.5;"></i>
                            </div>
                        </div>
                        <a th:href="@{/admin/dich-vu}" class="stretched-link"></a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
