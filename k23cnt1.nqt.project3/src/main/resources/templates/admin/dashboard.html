<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(nqtTitle='Dashboard')}">

<body>
    <div th:fragment="content">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-semibold text-gray-800">Dashboard</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-6">
            <!-- Users Card -->
            <div class="relative bg-gradient-to-r from-blue-500 to-blue-600 rounded-lg shadow-lg overflow-hidden">
                <div class="p-5">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-xs font-bold text-white/80 uppercase mb-1">Người dùng</div>
                            <div class="text-2xl font-bold text-white" th:text="${#lists.size(nqtNguoiDungList) ?: 0}">0
                            </div>
                        </div>
                        <div class="text-white/30">
                            <i class="bi bi-people-fill text-4xl"></i>
                        </div>
                    </div>
                </div>
                <a th:href="@{/admin/nguoi-dung}" class="absolute inset-0 z-10"></a>
            </div>

            <!-- Rooms Card -->
            <div class="relative bg-gradient-to-r from-green-500 to-green-600 rounded-lg shadow-lg overflow-hidden">
                <div class="p-5">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-xs font-bold text-white/80 uppercase mb-1">Phòng</div>
                            <div class="text-2xl font-bold text-white" th:text="${#lists.size(nqtPhongList) ?: 0}">0
                            </div>
                        </div>
                        <div class="text-white/30">
                            <i class="bi bi-house-door-fill text-4xl"></i>
                        </div>
                    </div>
                </div>
                <a th:href="@{/admin/phong}" class="absolute inset-0 z-10"></a>
            </div>

            <!-- Bookings Card -->
            <div class="relative bg-gradient-to-r from-yellow-500 to-yellow-600 rounded-lg shadow-lg overflow-hidden">
                <div class="p-5">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-xs font-bold text-white/80 uppercase mb-1">Đặt phòng</div>
                            <div class="text-2xl font-bold text-white" th:text="${#lists.size(nqtDatPhongList) ?: 0}">0
                            </div>
                        </div>
                        <div class="text-white/30">
                            <i class="bi bi-calendar-check-fill text-4xl"></i>
                        </div>
                    </div>
                </div>
                <a th:href="@{/admin/dat-phong}" class="absolute inset-0 z-10"></a>
            </div>

            <!-- Services Card -->
            <div class="relative bg-gradient-to-r from-cyan-500 to-cyan-600 rounded-lg shadow-lg overflow-hidden">
                <div class="p-5">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-xs font-bold text-white/80 uppercase mb-1">Dịch vụ</div>
                            <div class="text-2xl font-bold text-white" th:text="${#lists.size(nqtDichVuList) ?: 0}">0
                            </div>
                        </div>
                        <div class="text-white/30">
                            <i class="bi bi-star-fill text-4xl"></i>
                        </div>
                    </div>
                </div>
                <a th:href="@{/admin/dich-vu}" class="absolute inset-0 z-10"></a>
            </div>
        </div>
    </div>
</body>

</html>
