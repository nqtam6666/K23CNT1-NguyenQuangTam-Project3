<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(nqtTitle='Quản lý Phòng')}">
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-house-door"></i> Quản lý Phòng</h2>
            <a th:href="@{/admin/phong/create}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Thêm mới
            </a>
        </div>
        
        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Số phòng</th>
                            <th>Tên phòng</th>
                            <th>Loại phòng</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${nqtList}">
                            <td th:text="${item.nqtId}"></td>
                            <td th:text="${item.nqtSoPhong}"></td>
                            <td th:text="${item.nqtTenPhong}"></td>
                            <td th:text="${item.nqtTenLoaiPhong}"></td>
                            <td>
                                <span th:if="${item.nqtStatus}" class="badge bg-success">Trống</span>
                                <span th:unless="${item.nqtStatus}" class="badge bg-danger">Đã đặt</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/phong/edit/{id}(id=${item.nqtId})}" class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/admin/phong/delete/{id}(id=${item.nqtId})}" 
                                   class="btn btn-sm btn-danger" 
                                   onclick="return confirm('Bạn có chắc chắn muốn xóa?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
