<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(nqtTitle=${nqtId != null ? 'Sửa Phòng' : 'Thêm Phòng'})}">
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-house-door"></i>
                <span th:text="${nqtId != null ? 'Sửa Phòng' : 'Thêm Phòng'}"></span>
            </h2>
            <a th:href="@{/admin/phong}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Quay lại
            </a>
        </div>
        
        <div class="card">
            <div class="card-body">
                <form th:action="${nqtId != null ? '/admin/phong/edit/' + nqtId : '/admin/phong/create'}" 
                      th:object="${nqtRequest}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Số phòng</label>
                            <input type="text" class="form-control" th:field="*{nqtSoPhong}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tên phòng</label>
                            <input type="text" class="form-control" th:field="*{nqtTenPhong}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Loại phòng</label>
                            <select class="form-select" th:field="*{nqtLoaiPhongId}">
                                <option value="">-- Chọn loại phòng --</option>
                                <option th:each="lp : ${nqtLoaiPhongList}" 
                                        th:value="${lp.nqtId}" 
                                        th:text="${lp.nqtTenLoaiPhong}"></option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Trạng thái</label>
                            <select class="form-select" th:field="*{nqtStatus}">
                                <option th:value="true">Trống</option>
                                <option th:value="false">Đã đặt</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Lưu
                        </button>
                        <a th:href="@{/admin/phong}" class="btn btn-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
