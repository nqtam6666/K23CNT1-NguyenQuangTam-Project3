<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(nqtTitle=${nqtId != null ? 'Sửa Blog' : 'Thêm Blog'})}">
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-newspaper"></i>
                <span th:text="${nqtId != null ? 'Sửa Blog' : 'Thêm Blog'}"></span>
            </h2>
            <a th:href="@{/admin/blog}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Quay lại
            </a>
        </div>
        
        <div class="card">
            <div class="card-body">
                <form th:action="${nqtId != null ? '/admin/blog/edit/' + nqtId : '/admin/blog/create'}" 
                      th:object="${nqtRequest}" method="post">
                    <div class="row">
                        <div class="col-12 mb-3">
                            <label class="form-label">Tiêu đề</label>
                            <input type="text" class="form-control" th:field="*{nqtTieuDe}" required>
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label">Nội dung</label>
                            <textarea class="form-control" th:field="*{nqtNoiDung}" rows="10" required></textarea>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Hình ảnh (URL)</label>
                            <input type="text" class="form-control" th:field="*{nqtHinhAnh}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Trạng thái</label>
                            <select class="form-select" th:field="*{nqtStatus}">
                                <option th:value="true">Hiện</option>
                                <option th:value="false">Ẩn</option>
                            </select>
                        </div>
                    </div>
                    <hr>
                    <h5>SEO Settings</h5>
                    <div class="row">
                        <div class="col-12 mb-3">
                            <label class="form-label">Meta Title</label>
                            <input type="text" class="form-control" th:field="*{nqtMetaTitle}">
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label">Meta Keywords</label>
                            <input type="text" class="form-control" th:field="*{nqtMetaKeyword}" placeholder="keyword1, keyword2, keyword3">
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label">Meta Description</label>
                            <textarea class="form-control" th:field="*{nqtMetaDescription}" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Lưu
                        </button>
                        <a th:href="@{/admin/blog}" class="btn btn-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
