<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(nqtTitle='Quản lý Blog')}">

<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-newspaper"></i> Quản lý Blog</h2>
            <a th:href="@{/admin/blog/create}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Thêm mới
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tiêu đề</th>
                            <th>Hình ảnh</th>
                            <th>Ngày tạo</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${nqtList}">
                            <td th:text="${item.nqtId}"></td>
                            <td th:text="${item.nqtTieuDe}"></td>
                            <td>
                                <img th:if="${item.nqtHinhAnh}" th:src="${item.nqtHinhAnh}"
                                    style="width: 50px; height: 50px; object-fit: cover;" class="rounded">
                            </td>
                            <td th:text="${#temporals.format(item.nqtNgayTao, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <span th:if="${item.nqtStatus}" class="badge bg-success">Hiện</span>
                                <span th:unless="${item.nqtStatus}" class="badge bg-secondary">Ẩn</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/blog/edit/{id}(id=${item.nqtId})}" class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/admin/blog/delete/{id}(id=${item.nqtId})}"
                                    class="btn btn-sm btn-danger btn-delete">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
