<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(nqtTitle='Quản lý Loại Phòng')}">

<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-door-open"></i> Quản lý Loại Phòng</h2>
            <a th:href="@{/admin/loai-phong/create}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Thêm mới
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên loại phòng</th>
                            <th>Giá</th>
                            <th>Số người</th>
                            <th>Hình ảnh</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${nqtList}">
                            <td th:text="${item.nqtId}"></td>
                            <td th:text="${item.nqtTenLoaiPhong}"></td>
                            <td th:text="${#numbers.formatDecimal(item.nqtGia, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                            <td th:text="${item.nqtSoNguoi}"></td>
                            <td>
                                <img th:if="${item.nqtHinhAnh}" th:src="${item.nqtHinhAnh}"
                                    style="width: 50px; height: 50px; object-fit: cover;" class="rounded">
                            </td>
                            <td>
                                <span th:if="${item.nqtStatus}" class="badge bg-success">Hoạt động</span>
                                <span th:unless="${item.nqtStatus}" class="badge bg-secondary">Không hoạt động</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/loai-phong/edit/{id}(id=${item.nqtId})}"
                                    class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/admin/loai-phong/delete/{id}(id=${item.nqtId})}"
                                    class="btn btn-sm btn-danger btn-delete">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
