<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(nqtTitle='Quản lý Đặt Phòng')}">
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-calendar-check"></i> Quản lý Đặt Phòng</h2>
            <a th:href="@{/admin/dat-phong/create}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Thêm mới
            </a>
        </div>
        
        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Người dùng</th>
                            <th>Số phòng</th>
                            <th>Ngày đến</th>
                            <th>Ngày đi</th>
                            <th>Tổng tiền</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${nqtList}">
                            <td th:text="${item.nqtId}"></td>
                            <td th:text="${item.nqtTenNguoiDung}"></td>
                            <td th:text="${item.nqtSoPhong}"></td>
                            <td th:text="${#temporals.format(item.nqtNgayDen, 'dd/MM/yyyy')}"></td>
                            <td th:text="${#temporals.format(item.nqtNgayDi, 'dd/MM/yyyy')}"></td>
                            <td th:text="${#numbers.formatDecimal(item.nqtTongTien, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                            <td>
                                <span th:if="${item.nqtStatus == 0}" class="badge bg-warning">Chưa thanh toán</span>
                                <span th:if="${item.nqtStatus == 1}" class="badge bg-success">Đã thanh toán</span>
                                <span th:if="${item.nqtStatus == 2}" class="badge bg-danger">Hoàn tiền</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/dat-phong/edit/{id}(id=${item.nqtId})}" class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/admin/dat-phong/delete/{id}(id=${item.nqtId})}" 
                                   class="btn btn-sm btn-danger" 
                                   onclick="return confirm('Bạn có chắc chắn muốn xóa?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
