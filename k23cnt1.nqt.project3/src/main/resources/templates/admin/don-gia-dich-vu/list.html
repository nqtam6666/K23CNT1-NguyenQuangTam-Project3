<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(nqtTitle='Quản lý Đơn giá Dịch vụ')}">

<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-receipt"></i> Quản lý Đơn giá Dịch vụ</h2>
            <a th:href="@{/admin/don-gia-dich-vu/create}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Thêm mới
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Đặt phòng</th>
                                <th>Dịch vụ</th>
                                <th>Số lượng</th>
                                <th>Thành tiền</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${nqtList}">
                                <td th:text="${item.nqtId}"></td>
                                <td th:text="${item.nqtDatPhongId}"></td>
                                <td th:text="${item.nqtDichVuId}"></td>
                                <td th:text="${item.nqtSoLuong}"></td>
                                <td
                                    th:text="${#numbers.formatDecimal(item.nqtThanhTien, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                                </td>
                                <td>
                                    <a th:href="@{/admin/don-gia-dich-vu/edit/{id}(id=${item.nqtId})}"
                                        class="btn btn-sm btn-warning">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/admin/don-gia-dich-vu/delete/{id}(id=${item.nqtId})}"
                                        class="btn btn-sm btn-danger"
                                        onclick="return confirm('Bạn có chắc chắn muốn xóa?');">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
