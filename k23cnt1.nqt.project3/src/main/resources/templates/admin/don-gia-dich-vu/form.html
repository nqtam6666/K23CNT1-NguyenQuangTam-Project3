<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(nqtTitle='Form Đơn giá Dịch vụ')}">

<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 th:text="${nqtId != null ? 'Cập nhật Đơn giá Dịch vụ' : 'Thêm mới Đơn giá Dịch vụ'}"></h2>
            <a th:href="@{/admin/don-gia-dich-vu}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Quay lại
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <form
                    th:action="${nqtId != null ? '/admin/don-gia-dich-vu/edit/' + nqtId : '/admin/don-gia-dich-vu/create'}"
                    th:object="${nqtRequest}" method="post">

                    <div class="mb-3">
                        <label for="nqtDatPhongId" class="form-label">Đặt phòng</label>
                        <select class="form-select" id="nqtDatPhongId" th:field="*{nqtDatPhongId}" required>
                            <option value="">-- Chọn đặt phòng --</option>
                            <option th:each="dp : ${nqtDatPhongList}" th:value="${dp.nqtId}"
                                th:text="'Mã: ' + ${dp.nqtId}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="nqtDichVuId" class="form-label">Dịch vụ</label>
                        <select class="form-select" id="nqtDichVuId" th:field="*{nqtDichVuId}" required>
                            <option value="">-- Chọn dịch vụ --</option>
                            <option th:each="dv : ${nqtDichVuList}" th:value="${dv.nqtId}"
                                th:data-price="${dv.nqtDonGia}"
                                th:text="${dv.nqtTen} + ' - ' + ${#numbers.formatDecimal(dv.nqtDonGia, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="nqtSoLuong" class="form-label">Số lượng</label>
                        <input type="number" class="form-control" id="nqtSoLuong" th:field="*{nqtSoLuong}" required
                            min="1">
                    </div>

                    <div class="mb-3">
                        <label for="nqtThanhTien" class="form-label">Thành tiền</label>
                        <input type="number" class="form-control" id="nqtThanhTien" th:field="*{nqtThanhTien}" required
                            step="0.01" readonly>
                        <div class="form-text">Tự động tính toán (Số lượng * Đơn giá)</div>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Lưu lại
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const dichVuSelect = document.getElementById('nqtDichVuId');
            const soLuongInput = document.getElementById('nqtSoLuong');
            const thanhTienInput = document.getElementById('nqtThanhTien');

            function calculateTotal() {
                const selectedOption = dichVuSelect.options[dichVuSelect.selectedIndex];
                const price = parseFloat(selectedOption.getAttribute('data-price')) || 0;
                const quantity = parseFloat(soLuongInput.value) || 0;

                const total = price * quantity;
                thanhTienInput.value = total;
            }

            dichVuSelect.addEventListener('change', calculateTotal);
            soLuongInput.addEventListener('input', calculateTotal);
        });
    </script>
</body>

</html>
