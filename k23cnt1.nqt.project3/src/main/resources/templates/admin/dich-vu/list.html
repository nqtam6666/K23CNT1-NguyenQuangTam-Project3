<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(nqtTitle='Quản lý Dịch Vụ')}">
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-star"></i> Quản lý Dịch Vụ</h2>
            <a th:href="@{/admin/dich-vu/create}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Thêm mới
            </a>
        </div>
        
        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên dịch vụ</th>
                            <th>Đơn giá</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${nqtList}">
                            <td th:text="${item.nqtId}"></td>
                            <td th:text="${item.nqtTen}"></td>
                            <td th:text="${#numbers.formatDecimal(item.nqtDonGia, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                            <td>
                                <span th:if="${item.nqtStatus}" class="badge bg-success">Hoạt động</span>
                                <span th:unless="${item.nqtStatus}" class="badge bg-secondary">Không hoạt động</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/dich-vu/edit/{id}(id=${item.nqtId})}" class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/admin/dich-vu/delete/{id}(id=${item.nqtId})}" 
                                   class="btn btn-sm btn-danger" 
                                   onclick="return confirm('Bạn có chắc chắn muốn xóa?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
